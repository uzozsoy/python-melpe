name: Python MELPe Build

on:
  push:
    paths:
      - ".github/workflows/python-melpe.yml"
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "README.python.md"
      - "src/**"
      - "melpe/**"
  pull_request:
    paths:
      - ".github/workflows/python-melpe.yml"
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "README.python.md"
      - "src/**"
      - "melpe/**"

jobs:
  build-and-smoke-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Smoke test
        run: python -c "import numpy as np; import melpe_artifacts as melpe; x = np.linspace(-0.5, 0.5, 8000, dtype=np.float32); y = melpe.simulate_melpe(x, sample_rate=8000); assert melpe.is_available(); assert y.shape == x.shape; assert y.dtype == x.dtype; print(float(np.max(np.abs(y))))"
